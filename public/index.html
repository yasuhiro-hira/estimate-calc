<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="外構見積">
<meta name="theme-color" content="#2563eb">
<title>外構見積計算</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e2e6ea;
  --accent:#2563eb;--accent-light:#eff6ff;
  --green:#059669;--green-light:#ecfdf5;
  --orange:#d97706;--orange-light:#fffbeb;
  --red:#dc2626;--text:#111827;--text2:#6b7280;--text3:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:80px;}
header{background:var(--accent);padding:14px 16px;position:sticky;top:0;z-index:100;}
header h1{font-size:16px;font-weight:700;color:#fff;}
header p{font-size:11px;color:rgba(255,255,255,0.7);margin-top:1px;}

.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;margin:12px 16px 0;}
.card-title{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--text2);text-transform:uppercase;margin-bottom:10px;}
.gap{margin-top:12px;}

/* タブ */
.tab-bar{display:flex;gap:6px;margin:12px 16px 0;}
.tab-btn{flex:1;padding:10px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:700;color:var(--text2);background:var(--card);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all 0.12s;}
.tab-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.show{display:block;}

/* 選択ボタン */
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sel-grid.col3{grid-template-columns:1fr 1fr 1fr;}
.sel-btn{border:1.5px solid var(--border);border-radius:8px;padding:9px 6px;cursor:pointer;background:var(--card);text-align:center;font-size:12px;font-weight:700;color:var(--text2);transition:all 0.12s;-webkit-tap-highlight-color:transparent;line-height:1.3;}
.sel-btn small{display:block;font-size:10px;font-weight:400;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.sel-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.sel-btn:active{transform:scale(0.97);}
.step{display:none;}
.step.show{display:block;}

/* 数値コントロール */
.m-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;}
.m-ctrl-btn{width:46px;background:#f9fafb;border:none;font-size:22px;color:var(--text2);cursor:pointer;padding:8px 0;flex-shrink:0;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;}
.m-ctrl-btn:active{background:var(--accent-light);color:var(--accent);}
.m-ctrl input{border:none;border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);border-radius:0;flex:1;text-align:center;font-size:20px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:7px 0;outline:none;color:var(--text);}

/* 利益率 */
.mg-btns{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.mg-btn{padding:6px 10px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text2);background:var(--card);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.12s;}
.mg-btn.active{border-color:var(--orange);background:var(--orange-light);color:var(--orange);}
.mg-custom{border:1.5px solid var(--border);border-radius:20px;padding:6px 8px;font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--text);width:64px;text-align:center;outline:none;}

/* 追加ボタン */
.add-btn{display:block;width:calc(100% - 32px);margin:12px 16px 0;padding:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.add-btn:active{opacity:0.85;transform:scale(0.98);}

/* 品目カード */
.items-wrap{margin:14px 16px 0;}
.items-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.items-hd-title{font-size:13px;font-weight:700;}
.items-clear{font-size:12px;color:var(--red);cursor:pointer;padding:4px 8px;}

.item-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}

/* 1行サマリ */
.item-summary{display:flex;align-items:center;padding:10px 12px;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.item-summary:active{background:#f8fafc;}
.item-sum-main{flex:1;min-width:0;}
.item-sum-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sum-calc{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sum-profit{font-size:11px;color:var(--orange);font-weight:700;white-space:nowrap;flex-shrink:0;}
.item-sum-edit{background:none;border:1px solid #93c5fd;border-radius:5px;color:var(--accent);font-size:11px;padding:3px 7px;cursor:pointer;flex-shrink:0;}
.item-sum-del{background:none;border:1px solid #fca5a5;border-radius:5px;color:var(--red);font-size:11px;padding:3px 7px;cursor:pointer;flex-shrink:0;}
.item-sum-arrow{font-size:12px;color:var(--text3);flex-shrink:0;transition:transform 0.2s;}
.item-sum-arrow.open{transform:rotate(180deg);}

/* アコーディオン詳細 */
.item-detail{display:none;border-top:1px solid var(--border);}
.item-detail.open{display:block;}

/* 内訳テーブル */
.detail-col-hd{display:grid;grid-template-columns:1fr 80px;padding:4px 14px 2px;background:#fafafa;}
.detail-col-hd span{font-size:10px;font-weight:700;color:var(--text3);text-align:right;}
.detail-col-hd span:first-child{text-align:left;}
.detail-row{display:grid;grid-template-columns:1fr 80px;padding:6px 14px;border-top:1px solid var(--border);}
.detail-label{font-size:11px;color:var(--text2);}
.detail-cost{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2);text-align:right;}
.detail-sep{border-top:1.5px dashed var(--border);margin:0 14px;}
.detail-sep-label{font-size:10px;color:var(--text3);padding:3px 14px;background:#fafafa;}
.detail-total-row{display:grid;grid-template-columns:1fr 80px;padding:7px 14px;background:var(--green-light);border-top:1.5px solid var(--green);}
.detail-total-label{font-size:12px;font-weight:700;color:var(--green);}
.detail-total-val{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green);text-align:right;}

/* 全体合計 */
.grand-card{background:var(--card);border-radius:12px;border:1.5px solid var(--green);margin:8px 16px 0;overflow:hidden;}
.grand-hd{background:var(--green);padding:8px 14px;font-size:12px;font-weight:700;color:#fff;}
.grand-row{display:grid;grid-template-columns:1fr auto auto;padding:8px 14px;border-top:1px solid var(--border);}
.grand-label{font-size:12px;color:var(--text2);}
.grand-est{font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text);text-align:right;min-width:100px;}
.grand-cost{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2);text-align:right;min-width:90px;}
.grand-total-row{background:var(--green-light);border-top:1.5px solid var(--green);padding:12px 14px;display:flex;justify-content:space-between;align-items:baseline;}
.grand-total-label{font-size:13px;font-weight:700;color:var(--green);}
.grand-total-val{font-size:26px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green);}
.grand-total-val span{font-size:12px;color:var(--text2);margin-left:2px;}
.grand-profit{background:#fff7ed;border-top:1px solid #fed7aa;padding:8px 14px;display:flex;align-items:center;gap:8px;}
.grand-profit-label{font-size:12px;color:var(--orange);font-weight:700;flex:1;}
.grand-profit-val{font-size:15px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--orange);}
.grand-profit-rate{font-size:11px;color:var(--orange);background:var(--orange-light);border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;}

/* PDF */
.pdf-btn{display:block;width:calc(100% - 32px);margin:10px 16px 0;padding:13px;background:#fff;color:var(--accent);font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:2px solid var(--accent);border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* 入力 */
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:var(--text2);font-weight:500;}
.field input{border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:15px;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text);background:#fff;outline:none;width:100%;}
.field input:focus{border-color:var(--accent);}
.col3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.hint{font-size:10px;color:var(--text3);margin-top:3px;text-align:center;}
</style>
</head>
<body>
<header>
  <h1>🏗 外構見積計算</h1>
  <p>品目追加 → 材工基礎込みm単価 → 合計</p>
</header>

<!-- タブ -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('fence')">🔲 メッシュフェンス</button>
  <button class="tab-btn" onclick="switchTab('foundation')">⬜ 基礎単体</button>
  <button class="tab-btn" onclick="switchTab('custom')">✏️ 手入力</button>
</div>

<!-- フェンスタブ -->
<div id="tab-fence" class="tab-panel show">
  <div class="card">
    <div class="card-title">① メーカー</div>
    <div class="sel-grid" id="makerGrid"></div>
  </div>
  <div class="card step" id="step-series">
    <div class="card-title">② シリーズ</div>
    <div class="sel-grid" id="seriesGrid"></div>
  </div>
  <div class="card step" id="step-height">
    <div class="card-title">③ 高さ</div>
    <div class="sel-grid col3" id="heightGrid"></div>
  </div>
  <div class="card step" id="step-m">
    <div class="card-title">④ 施工延長（m）</div>
    <div class="m-ctrl">
      <button class="m-ctrl-btn" onclick="chg('fenceM',-0.5)">−</button>
      <input type="number" id="fenceM" value="10" inputmode="decimal" oninput="onFenceMChange()">
      <button class="m-ctrl-btn" onclick="chg('fenceM',0.5)">＋</button>
    </div>

    <div class="card-title gap">⑤ 施工費ベース（円/m）× 1.15</div>
    <div class="m-ctrl">
      <button class="m-ctrl-btn" onclick="chg('fenceLabor',-100)">−</button>
      <input type="number" id="fenceLabor" value="0" inputmode="numeric" oninput="updateFenceLaborHint()">
      <button class="m-ctrl-btn" onclick="chg('fenceLabor',100)">＋</button>
    </div>
    <div class="hint" id="fenceLaborHint"></div>

    <div class="card-title gap">⑤ 基礎</div>
    <div class="col2">
      <button class="sel-btn" id="foundYesBtn" onclick="setFoundOpt(true)">基礎込み</button>
      <button class="sel-btn" id="foundNoBtn"  onclick="setFoundOpt(false)">基礎なし</button>
    </div>

    <div id="found-section" style="display:none; margin-top:12px;">
      <div class="card-title">基礎サイズ</div>
      <div class="sel-grid col3" id="fenceFoundGrid"></div>
      <div class="hint" id="foundQtyHint"></div>
      <div class="card-title gap">施工費ベース（円/個）× 1.15</div>
      <div class="m-ctrl">
        <button class="m-ctrl-btn" onclick="chg('foundLabor',-100)">−</button>
        <input type="number" id="foundLabor" value="2000" inputmode="numeric" oninput="updateFoundLaborHint()">
        <button class="m-ctrl-btn" onclick="chg('foundLabor',100)">＋</button>
      </div>
      <div class="hint" id="foundLaborHint"></div>
    </div>

    <div class="card-title gap">⑥ 利益率</div>
    <div class="mg-btns" id="fenceMgBtns">
      <button class="mg-btn" data-v="0"  onclick="setMg('fence',0)">なし</button>
      <button class="mg-btn" data-v="10" onclick="setMg('fence',10)">10%</button>
      <button class="mg-btn" data-v="15" onclick="setMg('fence',15)">15%</button>
      <button class="mg-btn" data-v="20" onclick="setMg('fence',20)">20%</button>
      <button class="mg-btn" data-v="25" onclick="setMg('fence',25)">25%</button>
      <button class="mg-btn" data-v="30" onclick="setMg('fence',30)">30%</button>
      <input class="mg-custom" type="number" id="fenceMgCustom" placeholder="任意%" inputmode="decimal" oninput="setMgCustom('fence')">
    </div>
  </div>
</div>

<!-- 基礎単体タブ -->
<div id="tab-foundation" class="tab-panel">
  <div class="card">
    <div class="card-title">① 基礎サイズ</div>
    <div class="sel-grid col3" id="foundOnlyGrid"></div>
  </div>
  <div class="card step" id="step-found-only">
    <div class="card-title">② 数量（個）</div>
    <div class="m-ctrl">
      <button class="m-ctrl-btn" onclick="chg('foundQty',-1)">−</button>
      <input type="number" id="foundQty" value="1" inputmode="numeric">
      <button class="m-ctrl-btn" onclick="chg('foundQty',1)">＋</button>
    </div>
    <div class="card-title gap">③ 施工費ベース（円/個）× 1.15</div>
    <div class="m-ctrl">
      <button class="m-ctrl-btn" onclick="chg('foundOnlyLabor',-100)">−</button>
      <input type="number" id="foundOnlyLabor" value="2000" inputmode="numeric" oninput="updateFoundOnlyLaborHint()">
      <button class="m-ctrl-btn" onclick="chg('foundOnlyLabor',100)">＋</button>
    </div>
    <div class="hint" id="foundOnlyLaborHint"></div>
    <div class="card-title gap">④ 利益率</div>
    <div class="mg-btns" id="foundMgBtns">
      <button class="mg-btn" data-v="0"  onclick="setMg('found',0)">なし</button>
      <button class="mg-btn" data-v="10" onclick="setMg('found',10)">10%</button>
      <button class="mg-btn" data-v="15" onclick="setMg('found',15)">15%</button>
      <button class="mg-btn" data-v="20" onclick="setMg('found',20)">20%</button>
      <button class="mg-btn" data-v="25" onclick="setMg('found',25)">25%</button>
      <button class="mg-btn" data-v="30" onclick="setMg('found',30)">30%</button>
      <input class="mg-custom" type="number" id="foundMgCustom" placeholder="任意%" inputmode="decimal" oninput="setMgCustom('found')">
    </div>
  </div>
</div>

<!-- 手入力タブ -->
<div id="tab-custom" class="tab-panel">
  <div class="card">
    <div class="field gap" style="margin-top:0;">
      <label>品目名</label>
      <input type="text" id="customName" placeholder="施工費・門扉など">
    </div>
    <div class="col3 gap">
      <div class="field"><label>原価単価（円）</label><input type="number" id="customCost" placeholder="5000" inputmode="numeric"></div>
      <div class="field"><label>数量</label><input type="number" id="customQty" placeholder="1" inputmode="decimal"></div>
      <div class="field"><label>単位</label><input type="text" id="customUnit" placeholder="式"></div>
    </div>
    <div class="card-title gap">利益率</div>
    <div class="mg-btns" id="customMgBtns">
      <button class="mg-btn" data-v="0"  onclick="setMg('custom',0)">なし</button>
      <button class="mg-btn" data-v="10" onclick="setMg('custom',10)">10%</button>
      <button class="mg-btn" data-v="15" onclick="setMg('custom',15)">15%</button>
      <button class="mg-btn" data-v="20" onclick="setMg('custom',20)">20%</button>
      <button class="mg-btn" data-v="25" onclick="setMg('custom',25)">25%</button>
      <button class="mg-btn" data-v="30" onclick="setMg('custom',30)">30%</button>
      <input class="mg-custom" type="number" id="customMgCustom" placeholder="任意%" inputmode="decimal" oninput="setMgCustom('custom')">
    </div>
  </div>
</div>

<button class="add-btn" onclick="addItem()">＋ 品目を追加</button>

<!-- 全体合計（品目リストの上） -->
<div class="grand-card" id="grandCard" style="display:none;">
  <div class="grand-hd">全体合計</div>
  <div style="background:var(--green-light);padding:14px 16px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid rgba(5,150,105,0.2);">
    <div style="font-size:13px;font-weight:700;color:var(--green);">合計見積金額</div>
    <div style="font-size:28px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green);" id="grandVal">—<span style="font-size:13px;color:var(--text2);margin-left:2px;">円</span></div>
  </div>
  <div style="background:#fff7ed;border-top:1px solid #fed7aa;padding:10px 16px;display:flex;align-items:center;gap:8px;">
    <div style="font-size:12px;color:var(--orange);font-weight:700;flex:1;">全体粗利</div>
    <div style="font-size:16px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--orange);" id="grandProfitAmt"></div>
    <div style="font-size:11px;color:var(--orange);background:var(--orange-light);border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;" id="grandProfitRate"></div>
  </div>
</div>

<!-- 品目リスト -->
<div class="items-wrap" id="itemsWrap" style="display:none;">
  <div class="items-hd">
    <div class="items-hd-title" id="itemsCount"></div>
    <div class="items-clear" onclick="clearAll()">全クリア</div>
  </div>
  <div id="itemsList"></div>
</div>

<button class="pdf-btn" id="pdfBtn" onclick="openPdfModal()" style="display:none;">📄 見積書PDFを作成</button>
<button class="pdf-btn" id="saveBtn" onclick="openSaveModal()" style="display:none;margin-top:8px;border-color:var(--green);color:var(--green);">💾 この見積を保存する</button>

<!-- 保存モーダル -->
<div id="saveModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;padding:20px;overflow-y:auto;">
  <div style="background:#fff;border-radius:14px;padding:20px;max-width:480px;margin:0 auto;">
    <div style="font-size:15px;font-weight:700;margin-bottom:16px;">💾 見積を保存</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="field"><label>件名（ファイル名になります）</label><input type="text" id="saveSubject" placeholder="山岡家瑞穂店 フェンス工事"></div>
      <div class="field"><label>客先</label><input type="text" id="saveClient" placeholder="日本道路 株式会社"></div>
      <div class="field"><label>日付</label><input type="text" id="saveDate"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button onclick="closeSaveModal()" style="flex:1;padding:12px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;">キャンセル</button>
      <button onclick="saveEstimate()" style="flex:2;padding:12px;border:none;border-radius:8px;background:var(--green);color:#fff;font-size:14px;font-weight:700;cursor:pointer;">ダウンロード</button>
    </div>
  </div>
</div>

<!-- PDFモーダル -->
<div id="pdfModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;padding:20px;overflow-y:auto;">
  <div style="background:#fff;border-radius:14px;padding:20px;max-width:480px;margin:0 auto;">
    <div style="font-size:15px;font-weight:700;margin-bottom:16px;">📄 見積書の情報を入力</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="col2">
        <div class="field"><label>見積番号</label><input type="text" id="pdfEstNo" placeholder="202606-001"></div>
        <div class="field"><label>日付</label><input type="text" id="pdfDate"></div>
      </div>
      <div class="field"><label>宛先（会社名）</label><input type="text" id="pdfClient" placeholder="日本道路 株式会社"></div>
      <div class="field"><label>件名</label><input type="text" id="pdfSubject" placeholder="山岡家瑞穂店 フェンス工事"></div>
      <div class="field"><label>有効期限</label><select id="pdfExpiry" style="border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:#fff;outline:none;width:100%;"></select></div>
      <div class="field">
        <label>見積条件</label>
        <div id="condList" style="display:flex;flex-direction:column;gap:6px;margin-top:2px;"></div>
        <button type="button" onclick="addCondItem('')" style="margin-top:8px;width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:8px;background:#fafafa;color:var(--text2);font-size:13px;cursor:pointer;">＋ 条件を追加</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;">

// ===== 計算ヘルパー =====
const fmt=n=>'¥'+Math.round(n).toLocaleString();
const ceilK=(n,k)=>Math.ceil(n/k)*k; // k単位切り上げ

function calcFenceGroup(fence, m, fenceLaborPerM, found, foundQty, foundLabor, margin){
  // フェンス原価
  const shikiri=fence.price*(fence.rate/100);
  const mat=shikiri*m;
  const loss=mat*0.05;
  const lab=fenceLaborPerM*m;  // 施工費は引数から
  const fenceCost=mat+loss+lab;

  // 基礎原価
  let foundMat=0,foundLab=0,foundCost=0;
  if(found&&foundQty>0){
    foundMat=found.shikiri*foundQty;
    foundLab=foundLabor*foundQty;
    foundCost=foundMat+foundLab;
  }

  const totalCost=fenceCost+foundCost;

  // m単価：合計原価÷m → 利益乗せ → 千円切り上げ
  const costPerM=totalCost/m;
  const sellPerM=margin>0&&margin<100?costPerM/(1-margin/100):costPerM;
  const estPerM=ceilK(sellPerM,100); // 100円切り上げ
  const estTotal=Math.round(estPerM*m);

  // 値引き（万円切り捨て）
  const discount=estTotal%10000;
  const finalEst=estTotal-discount;
  const profit=finalEst-totalCost;
  const profitRate=finalEst>0?profit/finalEst*100:0;

  return {
    m, estPerM, estTotal, discount, finalEst,
    totalCost, profit, profitRate,
    fence:{mat,loss,lab,cost:fenceCost},
    found:{mat:foundMat,lab:foundLab,cost:foundCost,qty:foundQty},
  };
}

// ===== 品目追加 =====
function addItem(){
  if(currentTab==='fence'){
    if(!selFence){alert('高さまで選択してください');return;}
    const m=parseFloat(document.getElementById('fenceM').value)||0;
    if(m<=0){alert('延長を入力してください');return;}
    if(foundWithFence===null){alert('基礎込み / 基礎なし を選択してください');return;}
    if(foundWithFence&&!selFenceFound){alert('基礎サイズを選択してください');return;}
    const foundQty=foundWithFence?Math.ceil(m/2)+1:0;
    const foundLaborBase=foundWithFence?(parseFloat(document.getElementById('foundLabor').value)||0):0;
    const foundLabor=Math.round(foundLaborBase*1.15);
    const fenceLaborBase=parseFloat(document.getElementById('fenceLabor').value)||selFence.height;
    const fenceLaborPerM=Math.round(fenceLaborBase*1.15);
    const margin=mg.fence;
    const res=calcFenceGroup(selFence,m,fenceLaborPerM,foundWithFence?selFenceFound:null,foundQty,foundLabor,margin);

    const withFoundLabel=foundWithFence?` 基礎込み □${selFenceFound.name}`:' 基礎別';
    const fenceNaiyaku=`${selFence.name}${withFoundLabel}`;
    groups.push({
      id:Date.now(), type:'fence',
      hinshuu:'メッシュフェンス',      // 品種
      naiyaku: fenceNaiyaku,           // 内訳
      title:`${selFence.maker} ${selFence.name}${withFoundLabel}`,
      titleSub:`×${m}m`,
      withFound:foundWithFence,
      foundName:foundWithFence?selFenceFound.name:'',
      foundQty,foundLabor,
      fence:selFence, m, fenceLaborPerM, margin, res,
      estFinal:res.finalEst,
      costTotal:res.totalCost,
    });
    renderGroups();
    resetToTop();
  }
  else if(currentTab==='foundation'){
    if(!selFoundOnly){alert('基礎サイズを選択してください');return;}
    const qty=parseFloat(document.getElementById('foundQty').value)||0;
    if(qty<=0){alert('数量を入力してください');return;}
    const laborBase=parseFloat(document.getElementById('foundOnlyLabor').value)||0;
    const labor=Math.round(laborBase*1.15);
    const mat=selFoundOnly.shikiri*qty;
    const lab=labor*qty;
    const cost=mat+lab;
    const margin=mg.found;
    const sellPerUnit=margin>0&&margin<100?(cost/qty)/(1-margin/100):cost/qty;
    const estPerUnit=ceilK(sellPerUnit,100);
    const estTotal=Math.round(estPerUnit*qty);
    const discount=estTotal%10000;
    const finalEst=estTotal-discount;
    const profit=finalEst-cost;
    const profitRate=finalEst>0?profit/finalEst*100:0;
    groups.push({
      id:Date.now(), type:'foundation',
      hinshuu:'独立基礎',
      naiyaku:`□${selFoundOnly.name}`,
      title:`独立基礎 □${selFoundOnly.name}`,
      titleSub:`×${qty}個`,
      qty, labor, mat, lab, cost, margin,
      estPerUnit, estTotal, discount, finalEst, profit, profitRate,
      estFinal:finalEst, costTotal:cost,
    });
    renderGroups();
    resetToTop();
  }
  else if(currentTab==='custom'){
    const name=document.getElementById('customName').value.trim();
    const costUnit=parseFloat(document.getElementById('customCost').value)||0;
    const qty=parseFloat(document.getElementById('customQty').value)||0;
    const unit=document.getElementById('customUnit').value||'式';
    if(!name||!costUnit||!qty){alert('品目名・原価単価・数量を入力してください');return;}
    const cost=costUnit*qty;
    const margin=mg.custom;
    const sellPerUnit=margin>0&&margin<100?costUnit/(1-margin/100):costUnit;
    const estPerUnit=ceilK(sellPerUnit,100);
    const estTotal=Math.round(estPerUnit*qty);
    const discount=estTotal%10000;
    const finalEst=estTotal-discount;
    const profit=finalEst-cost;
    const profitRate=finalEst>0?profit/finalEst*100:0;
    groups.push({
      id:Date.now(), type:'custom',
      hinshuu:name,
      naiyaku:'',
      title:name, titleSub:`×${qty}${unit}`,
      costUnit, qty, unit, cost, margin,
      estPerUnit, estTotal, discount, finalEst, profit, profitRate,
      estFinal:finalEst, costTotal:cost,
    });
    renderGroups();
    resetToTop();
  }
}

function renderGroups(){

  wrap.style.display='block';
  document.getElementById('itemsCount').textContent=`品目一覧 (${groups.length}件)`;
  list.innerHTML='';
  groups.forEach(g=>list.appendChild(makeCard(g)));
  renderGrand();
}

    calcText=`¥${g.estPerUnit.toLocaleString()} × ${g.qty}${g.unit} = ¥${g.finalEst.toLocaleString()}`;

      ${foundDetail}
      <div class="detail-total-row">

        <div class="detail-total-val">${fmt(r.totalCost)}</div>
      </div>`;
  } else if(g.type==='foundation'){
    detailHTML=`
      <div class="detail-col-hd"><span>原価内訳</span><span>原価</span></div>
      <div class="detail-row"><div class="detail-label">材料費（仕切価格）</div><div class="detail-cost">${fmt(g.mat)}</div></div>
      <div class="detail-row"><div class="detail-label">施工費（¥${g.labor.toLocaleString()}/個）</div><div class="detail-cost">${fmt(g.lab)}</div></div>
      <div class="detail-total-row">
        <div class="detail-total-label">合計原価</div>
        <div class="detail-total-val">${fmt(g.cost)}</div>
      </div>`;
  } else {
    detailHTML=`
      <div class="detail-col-hd"><span>原価内訳</span><span>原価</span></div>
      <div class="detail-row"><div class="detail-label">¥${g.costUnit.toLocaleString()}/${g.unit} × ${g.qty}${g.unit}</div><div class="detail-cost">${fmt(g.cost)}</div></div>

    <div class="item-summary" onclick="toggleDetail(${uid})">

    mg[type]=Number(val)||0;
    document.querySelectorAll(`#${type}MgBtns .mg-btn`).forEach(b=>b.classList.remove('active'));
    document.getElementById(type+'MgCustom').value=val||'';
  }
}

function editGroup(id){
  const g=groups.find(x=>x.id===id);
  if(!g)return;
  // いったん削除してフォームに復元
  groups=groups.filter(x=>x.id!==id);
  renderGroups();

  if(g.type==='fence'){
    switchTab('fence');
    selMaker=g.fence.maker; selSeries=g.fence.series; selFence=g.fence;
    renderMakerGrid(); renderSeriesGrid(); renderHeightGrid();

    document.getElementById('step-height').classList.add('show');
    document.getElementById('step-m').classList.add('show');
    document.getElementById('fenceM').value=g.m;
    document.getElementById('fenceLabor').value=Math.round(g.fenceLaborPerM/1.15);
    updateFenceLaborHint();
    setFoundOpt(g.withFound);
    if(g.withFound){
      selFenceFound=FOUND_MASTER.find(f=>f.name===g.foundName)||null;
      renderFenceFoundGrid();
      document.getElementById('foundLabor').value=Math.round(g.foundLabor/1.15);
      updateFoundLaborHint();
      updateFoundHint();
    }
    restoreMg('fence',g.margin);
  }
  else if(g.type==='foundation'){
    switchTab('foundation');
    selFoundOnly=FOUND_MASTER.find(f=>f.name===g.naiyaku.replace('□',''))||null;
    renderFoundOnlyGrid();
    document.getElementById('step-found-only').classList.add('show');
    document.getElementById('foundQty').value=g.qty;
    document.getElementById('foundOnlyLabor').value=Math.round(g.labor/1.15);
    updateFoundOnlyLaborHint();
    restoreMg('found',g.margin||0);
  }
  else if(g.type==='custom'){
    switchTab('custom');
    document.getElementById('customName').value=g.hinshuu;
    document.getElementById('customCost').value=g.costUnit;
    document.getElementById('customQty').value=g.qty;
    document.getElementById('customUnit').value=g.unit;
    restoreMg('custom',g.margin||0);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetToTop(){
  const safe=(id,fn)=>{const el=document.getElementById(id);if(el)fn(el);};

  selMaker=null;selSeries=null;selFence=null;
  selFenceFound=null;foundWithFence=null;

  safe('step-series',el=>el.classList.remove('show'));
  safe('step-height',el=>el.classList.remove('show'));
  safe('step-m',el=>el.classList.remove('show'));
  safe('found-section',el=>el.style.display='none');
  safe('foundYesBtn',el=>el.classList.remove('active'));
  safe('foundNoBtn',el=>el.classList.remove('active'));
  safe('fenceLabor',el=>el.value=0);
  safe('fenceLaborHint',el=>el.textContent='');
  safe('fenceM',el=>el.value=10);
  renderMakerGrid();renderSeriesGrid();renderHeightGrid();renderFenceFoundGrid();

  selFoundOnly=null;
  safe('step-found-only',el=>el.classList.remove('show'));
  safe('foundQty',el=>el.value=1);
  safe('foundOnlyLabor',el=>el.value=0);
  safe('foundOnlyLaborHint',el=>el.textContent='');
  renderFoundOnlyGrid();

  safe('customName',el=>el.value='');
  safe('customCost',el=>el.value='');
  safe('customQty',el=>el.value='');
  safe('customUnit',el=>el.value='');

  ['fence','found','custom'].forEach(t=>setMg(t,0));
  switchTab('fence');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderGrand(){
  const card=document.getElementById('grandCard');
  const pdfBtn=document.getElementById('pdfBtn');
  const saveBtn=document.getElementById('saveBtn');
  if(groups.length===0){card.style.display='none';pdfBtn.style.display='none';saveBtn.style.display='none';return;}
  card.style.display='block';pdfBtn.style.display='block';saveBtn.style.display='block';

  const totalFinal=groups.reduce((s,g)=>s+g.estFinal,0);
  const totalCost=groups.reduce((s,g)=>s+g.costTotal,0);
  const totalProfit=totalFinal-totalCost;
  const totalProfitRate=totalFinal>0?totalProfit/totalFinal*100:0;

  document.getElementById('grandVal').innerHTML=`${totalFinal.toLocaleString()}<span>円</span>`;
  document.getElementById('grandProfitAmt').textContent=fmt(totalProfit);
  document.getElementById('grandProfitRate').textContent=`${totalProfitRate.toFixed(1)}%`;
}

function saveEstimate(){
  if(groups.length===0){alert('品目がありません');return;}
  const subject=document.getElementById('saveSubject').value||'見積';
  closeSaveModal();

  // 状態をheadに注入（type="application/json"なので自動実行されない）
  let stateEl=document.getElementById('saved-state');
  if(!stateEl){
    stateEl=document.createElement('script');
    stateEl.id='saved-state';
    stateEl.type='application/json';
    document.head.appendChild(stateEl);
  }
  stateEl.textContent=JSON.stringify(groups).replace(/<\//g,'<\\/');

  // タイトルを更新
  const prevTitle=document.title;
  document.title=subject;

  // 現在のページHTMLをそのままキャプチャ（Firebaseへのfetch不要）
  const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;

  // ライブDOMを元に戻す
  stateEl.remove();
  document.title=prevTitle;

  // ダウンロード
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='見積_'+subject+'.html';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function addCondItem(text){
  const list=document.getElementById('condList');
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:6px;align-items:center;';

  inp.type='text';inp.value=text;

  inp.addEventListener('focus',()=>inp.style.borderColor='var(--accent)');
  inp.addEventListener('blur',()=>inp.style.borderColor='var(--border)');
  inp.addEventListener('keydown',e=>{

}
function suggestEstNo(){
  const today=new Date();
  const ym=`${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}`;
  const stored=JSON.parse(localStorage.getItem('estNoState')||'null');
  const seq=(stored&&stored.month===ym)?stored.seq+1:1;
  return `${ym}-${String(seq).padStart(3,'0')}`;
}

// 保存ファイルから開いた場合の状態復元
// saved-stateは</head>内に注入されるため、body末尾のこのスクリプト実行時には既にDOM上にある
(function(){
  const el=document.getElementById('saved-state');
  if(!el)return;
  try{
    const saved=JSON.parse(el.textContent);
    if(Array.isArray(saved)&&saved.length>0){
      groups=saved;
      renderGroups();
    }
  }catch(e){console.error('State restore failed:',e);}
})();
</script>
